name: Build Installers

on:
  push:
    tags:
      - 'v*' # Dispara quando você cria uma tag (ex: v1.0.0)
  workflow_dispatch: # Permite rodar manualmente no painel do GitHub

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        pip install flask yt-dlp curl_cffi flask-cors pywebview pyinstaller

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pip install pyinstaller pywebview yt-dlp flask flask-cors curl_cffi
        pyinstaller --noconsole --onefile --add-data "static;static" main_app.py
        mv dist/main_app.exe dist/SaveFlow-Setup.exe

    - name: Build with PyInstaller (Mac)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --noconsole --onefile --add-data "static:static" --name "SaveFlow" main_app.py
        # Instala ferramenta para criar DMG
        brew install create-dmg
        # Cria o arquivo .dmg para instalação profissional
        mkdir -p dist/dmg
        cp -r dist/SaveFlow.app dist/dmg/
        create-dmg \
          --volname "SaveFlow Installer" \
          --window-pos 200 120 \
          --window-size 800 400 \
          --icon-size 100 \
          --icon "SaveFlow.app" 200 190 \
          --hide-extension "SaveFlow.app" \
          --app-drop-link 600 185 \
          "dist/SaveFlow-Mac.dmg" \
          "dist/dmg/"

    - name: Build with PyInstaller (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        pyinstaller --noconsole --onefile --add-data "static:static" main_app.py
        mv dist/main_app dist/saveflow
        # Instala ferramentas para empacotamento .deb e .rpm
        sudo apt-get update
        sudo apt-get install -y ruby-full build-essential rpm
        sudo gem install --no-document fpm
        # Cria o pacote .deb
        fpm -s dir -t deb -n saveflow -v 1.0.6 --prefix /usr/bin dist/saveflow
        # Cria o pacote .rpm
        fpm -s dir -t rpm -n saveflow -v 1.0.6 --prefix /usr/bin dist/saveflow

    - name: Release Packages
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/SaveFlow-Setup.exe
          dist/SaveFlow-Mac.dmg
          saveflow_1.0.6_amd64.deb
          saveflow-1.0.6-1.x86_64.rpm
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
