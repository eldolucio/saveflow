<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaveFlow — Download Direto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── [BLOCO 01: CORE & DESIGN SYSTEM] ────────────────────────────────────── */
:root {
  --bg: #080808; --s1: #111; --s2: #161616; --s3: #1e1e1e;
  --b1: rgba(255,255,255,0.07); --b2: rgba(255,255,255,0.13); --b3: rgba(255,255,255,0.22);
  --t1: #f2efe9; --t2: #888; --t3: #444; 
  --yt: #ff3333; --ig: #d63ecc; --tt: #2effd6; --green: #39e88f;
  --mono: 'Roboto Mono', monospace; --sans: 'Archivo', sans-serif;
  --r: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--t1); min-height: 100vh; line-height: 1.5; }

/* ── [BLOCO 02: LAYOUT & NAV] ────────────────────────────────────────────── */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.2rem 2rem; border-bottom: 1px solid var(--b1);
  position: sticky; top: 0; background: rgba(8,8,8,0.9); backdrop-filter: blur(12px); z-index: 100;
}
.nav-logo { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 900; letter-spacing: -0.5px; }
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

main { max-width: 720px; margin: 0 auto; padding: 3rem 1.5rem; width: 100%; }

/* ── [BLOCO 03: INPUT ZONE] ──────────────────────────────────────────────── */
.input-zone { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 1.5rem; transition: border-color 0.3s; margin-bottom: 1rem; }
.input-zone.glow-yt { border-color: rgba(255,51,51,0.2); }
.input-zone.glow-ig { border-color: rgba(214,62,204,0.2); }
.input-zone.glow-tt { border-color: rgba(46,255,214,0.15); }

.field-label { font-family: var(--mono); font-size: 10px; color: var(--t3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; display: block; }
.url-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
.url-field { flex: 1; background: var(--s2); border: 1px solid var(--b1); border-radius: 8px; padding: 12px 14px; color: var(--t1); outline: none; transition: border-color 0.2s; font-family: var(--mono); font-size: 12.5px; }
.url-field:focus { border-color: var(--b3); }

.btn-icon { width: 42px; border-radius: 8px; border: 1px solid var(--b1); background: var(--s2); color: var(--t2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.15s; }
.btn-icon:hover { border-color: var(--b2); color: var(--t1); }

.fetch-btn { width: 100%; padding: 13px; border-radius: 8px; border: 1px solid var(--b2); background: var(--s3); font-weight: 700; color: var(--t1); cursor: pointer; transition: 0.18s; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
.fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── [BLOCO 04: INFO CARDS] ──────────────────────────────────────────────── */
.card { background: var(--s1); border: 1px solid var(--b1); border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; display: none; animation: fadeUp 0.4s ease both; }
.info-top { display: flex; gap: 14px; margin-bottom: 1rem; }
.thumb { width: 110px; height: 66px; border-radius: 6px; overflow: hidden; background: var(--s3); flex-shrink: 0; position: relative; }
.thumb img { width: 100%; height: 100%; object-fit: cover; }
.duration { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.8); font-size: 10px; padding: 1px 4px; border-radius: 2px; }
.title { font-size: 14px; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.format-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-top: 10px; }
.fmt-btn { padding: 8px 10px; border-radius: 8px; border: 1px solid var(--b1); background: var(--s2); color: var(--t2); cursor: pointer; transition: 0.15s; text-align: left; }
.fmt-btn.selected { border-color: var(--t1); color: var(--t1); background: var(--s3); }
.fmt-label { display: block; font-weight: 700; font-size: 13px; }
.fmt-sub { font-size: 10px; font-family: var(--mono); color: var(--t3); }

/* ── [BLOCO 05: PROGRESS & UTILS] ────────────────────────────────────────── */
.prog-bar-bg { background: var(--s3); border-radius: 10px; height: 6px; overflow: hidden; margin: 12px 0; }
.prog-bar-fill { height: 100%; width: 0%; background: var(--green); box-shadow: 0 0 8px var(--green); transition: width 0.3s; }
.prog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-item { display: flex; flex-direction: column; gap: 2px; }
.stat-label { font-size: 10px; color: var(--t3); text-transform: uppercase; font-family: var(--mono); }
.stat-val { font-size: 13px; font-weight: 500; font-family: var(--mono); }

.error { background: rgba(255,60,60,0.06); border: 1px solid rgba(255,60,60,0.2); border-radius: 10px; padding: 14px; color: #ff6a6a; font-size: 13px; display: none; margin-bottom: 1rem; }
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--t1); color: var(--bg); padding: 10px 24px; border-radius: 100px; font-family: var(--mono); font-size: 12px; font-weight: 900; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ── [COLOR SCHEMES] ─────────────────────────────────────────────────────── */
.yt-btn { background: var(--yt) !important; color: white !important; }
.ig-btn { background: var(--ig) !important; color: white !important; }
.tt-btn { background: var(--tt) !important; color: black !important; }
.plat-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-top: 4px; display: inline-block; font-family: var(--mono); }
.plat-tag.youtube   { background: rgba(255,51,51,0.1); color: var(--yt); }
.plat-tag.instagram { background: rgba(214,62,204,0.1); color: var(--ig); }
.plat-tag.tiktok    { background: rgba(46,255,214,0.1); color: var(--tt); }
</style>
</head>
<body>

<nav>
  <div class="nav-logo"><div class="logo-dot"></div> SaveFlow</div>
  <span style="font-family:var(--mono); font-size:10px; color:var(--t3)">engine v1.0.1</span>
</nav>

<main>
  <div style="margin-bottom: 2.5rem;">
    <h1 style="font-size: clamp(34px, 6vw, 54px); font-weight: 900; letter-spacing: -2px; line-height: 1;">Vídeo & Áudio<br><span style="-webkit-text-stroke:1px var(--t2); -webkit-text-fill-color:transparent">em segundos.</span></h1>
    <p style="color:var(--t2); font-size:15px; margin-top:10px; font-weight:300">YouTube, Instagram e TikTok sem anúncios.</p>
  </div>

  <!-- [BLOCO: INPUT] -->
  <div class="input-zone" id="iz">
    <span class="field-label" id="fl">URL da mídia</span>
    <div class="url-row">
      <input class="url-field" id="url" type="text" placeholder="Cole o link aqui..." autocomplete="off">
      <button class="btn-icon" onclick="copy()" title="Colar">📋</button>
      <button class="btn-icon" onclick="reset()" title="Limpar">✕</button>
    </div>
    <button class="fetch-btn" id="fb" onclick="analisar()">Analisar Vídeo</button>
  </div>

  <!-- [BLOCO: STATUS/ERROR] -->
  <div class="error" id="err"></div>

  <!-- [BLOCO: INFO CARD] -->
  <div class="card" id="info">
    <div class="info-top">
      <div class="thumb">
        <img id="im" loading="lazy">
        <span class="duration" id="du"></span>
      </div>
      <div style="flex:1; min-width:0">
        <div class="title" id="ti"></div>
        <div style="font-size:11px; color:var(--t2); font-family:var(--mono)" id="au"></div>
        <span class="plat-tag" id="pl"></span>
      </div>
    </div>
    <div class="field-label">Formatos Disponíveis</div>
    <div class="format-grid" id="grid"></div>
  </div>

  <!-- [BLOCO: DOWNLOAD ACTION] -->
  <div class="card" id="dl-wrap" style="padding: 1rem;">
    <button class="fetch-btn" id="db" onclick="baixar()" style="background:var(--green); color:black">Download Agora</button>
  </div>

  <!-- [BLOCO: PROGRESS] -->
  <div class="card" id="prog-card" style="display:none">
    <div style="display:flex; justify-content:space-between; align-items:flex-end">
      <span class="field-label" style="margin:0" id="ps">Preparando...</span>
      <span style="font-family:var(--mono); font-size:11px" id="pp">0%</span>
    </div>
    <div class="prog-bar-bg"><div class="prog-bar-fill" id="pb"></div></div>
    <div class="prog-grid">
      <div class="stat-item"><span class="stat-label">Velocidade</span><span class="stat-val" id="sv">—</span></div>
      <div class="stat-item"><span class="stat-label">Restante</span><span class="stat-val" id="et">—</span></div>
    </div>
  </div>

  <!-- [BLOCO: DONE] -->
  <div class="card" id="done" style="text-align:center; background:rgba(57,232,143,0.05); border-color:rgba(57,232,143,0.2)">
    <div style="font-size:32px">✨</div>
    <h3 style="color:var(--green); letter-spacing:-0.5px">Download Concluído!</h3>
    <p style="font-size:12px; color:var(--t2); margin:5px 0 15px" id="fn"></p>
    <a id="salvar" style="display:inline-block; padding:12px 30px; background:var(--green); color:black; text-decoration:none; border-radius:8px; font-weight:900; font-size:14px">Salvar no Dispositivo</a>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
/* ── [JS BLOCO: CORE] ────────────────────────────────────────────────────── */
const API = '';
let selFmt = null;
let jobId = null;
let poll = null;
let info = null;

const cfg = {
  youtube:   { glow: 'glow-yt', btn: 'yt-btn', tag: 'YouTube' },
  instagram: { glow: 'glow-ig', btn: 'ig-btn', tag: 'Instagram' },
  tiktok:    { glow: 'glow-tt', btn: 'tt-btn', tag: 'TikTok' },
};

function $(id) { return document.getElementById(id); }
function show(id) { $(id).style.display = 'block'; }
function hide(id) { $(id).style.display = 'none'; }
function toast(m) { const t=$('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

/* ── [JS BLOCO: LOGIC] ───────────────────────────────────────────────────── */
$('url').oninput = (e) => {
  const v = e.target.value.toLowerCase();
  let p = 'youtube';
  if(v.includes('instagram')) p = 'instagram';
  if(v.includes('tiktok')) p = 'tiktok';
  
  $('iz').className = 'input-zone ' + (cfg[p]?.glow || '');
  $('fb').className = 'fetch-btn ' + (cfg[p]?.btn || '');
};

async function analisar() {
  const u = $('url').value.trim();
  if(!u) return toast('Insira um link!');
  
  hide('err'); hide('info'); hide('dl-wrap'); hide('done'); hide('prog-card');
  $('fb').disabled = true; $('fb').innerText = '⏳ Analisando...';

  try {
    const r = await fetch(API+'/api/info',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:u})});
    const d = await r.json();
    if(d.error) throw d.error;
    
    info = d;
    render(d);
  } catch(e) { 
    $('err').innerText = '⚠️ ' + e; show('err'); 
  } finally { 
    $('fb').disabled = false; $('fb').innerText = 'Analisar Vídeo'; 
  }
}

function render(d) {
  $('im').src = d.thumbnail;
  $('ti').innerText = d.title;
  $('au').innerText = d.uploader;
  $('du').innerText = d.duration ? (d.duration/60).toFixed(1)+'m' : '';
  $('pl').innerText = cfg[d.platform]?.tag || d.platform;
  $('pl').className = 'plat-tag ' + d.platform;
  
  const g = $('grid'); g.innerHTML = '';
  d.formats.forEach((f,i) => {
    const b = document.createElement('button');
    b.className = 'fmt-btn' + (i===0?' selected':'');
    const size = f.filesize ? ` · ${(f.filesize/1e6).toFixed(1)}MB` : '';
    b.innerHTML = `<span class="fmt-label">${f.label}</span><span class="fmt-sub">${f.ext}${size}</span>`;
    b.onclick = () => { document.querySelectorAll('.fmt-btn').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); selFmt=f; };
    if(i===0) selFmt=f;
    g.appendChild(b);
  });
  
  show('info'); show('dl-wrap');
}

async function baixar() {
  hide('dl-wrap'); show('prog-card');
  $('db').disabled = true;
  
  try {
    const r = await fetch(API+'/api/download',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:$('url').value,format:selFmt})});
    const d = await r.json();
    jobId = d.job_id;
    monitorar();
  } catch(e) { toast('Erro ao iniciar download'); }
}

function monitorar() {
  clearInterval(poll);
  poll = setInterval(async ()=>{
    try {
      const r = await fetch(API+`/api/status/${jobId}`);
      const j = await r.json();
      
      $('pb').style.width = j.progress + '%';
      $('pp').innerText = j.progress + '%';
      $('sv').innerText = j.speed || '—';
      $('et').innerText = j.eta ? j.eta+'s' : '...';
      $('ps').innerText = j.status === 'processing' ? 'Finalizando...' : 'Baixando...';

      if(j.status === 'done') {
        clearInterval(poll);
        hide('prog-card');
        $('fn').innerText = j.filename;
        $('salvar').onclick = (e) => {
           e.preventDefault();
           toast('Preparando transferência...');
           const a = document.createElement('a');
           a.href = API+`/api/file/${jobId}`;
           a.download = j.filename;
           a.click();
           toast('Download iniciado!');
        };
        show('done');
      }
      if(j.status==='error') { clearInterval(poll); toast(j.message); show('dl-wrap'); }
    } catch {}
  }, 800);
}

function copy() { navigator.clipboard.readText().then(t => { if(t.includes('http')) { $('url').value=t; $('url').dispatchEvent(new Event('input')); toast('Link colado!'); } }); }
function reset() { $('url').value=''; hide('info'); hide('dl-wrap'); hide('done'); hide('prog-card'); hide('err'); }
</script>
</body>
</html>
